<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutabaah Yaumiyah 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; }
        .active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-green-100">
        <div class="bg-green-800 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">📋 Mutabaah Yaumiyah</h1>
            <p class="text-green-100 opacity-80">LDK KISI Universitas Siliwangi</p>
        </div>

        <!-- STEP 1: PILIH IDENTITAS -->
        <div id="step1" class="p-6 active">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">📅 BULAN</label>
                    <select id="bulan" onchange="loadNama()" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                        <option>Memuat bulan...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">📅 PEKAN</label>
                    <select id="pekan" onchange="loadNama()" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                        <option value="1">Pekan 1</option>
                        <option value="2">Pekan 2</option>
                        <option value="3">Pekan 3</option>
                        <option value="4">Pekan 4</option>
                        <option value="5">Pekan 5</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">👤 NAMA LENGKAP</label>
                    <select id="nama" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                        <option>Memuat nama...</option>
                    </select>
                </div>
                <button onclick="lanjut()" class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg">Lanjut Isi Amalan →</button>
            </div>
        </div>

        <!-- STEP 2: ISI AMALAN -->
        <div id="step2" class="p-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg text-green-800">Isi Amalan: <span id="displayNama" class="text-green-600"></span></h2>
                <button onclick="kembali()" class="text-sm text-gray-500 underline">Ganti Nama</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Subuh (0-7)</label>
                    <input type="number" id="subuh" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Dzuhur (0-7)</label>
                    <input type="number" id="dzuhur" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Ashar (0-7)</label>
                    <input type="number" id="ashar" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Magrib (0-7)</label>
                    <input type="number" id="magrib" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Isya (0-7)</label>
                    <input type="number" id="isya" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Tahajjud (0-7)</label>
                    <input type="number" id="tahajjud" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Dhuha (0-7)</label>
                    <input type="number" id="dhuha" value="0" min="0" max="7" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Tilawah (Hal)</label>
                    <input type="number" id="tilawah" value="0" min="0" class="w-full p-2 border rounded">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase">Curhatan Kamu</label>
                    <textarea id="keluh" class="w-full p-2 border rounded" placeholder="Allah selalu mendengar..."></textarea>
                </div>
            </div>
            <button id="btnKirim" onclick="kirim()" class="w-full mt-6 bg-green-700 hover:bg-green-800 text-white py-4 rounded-xl font-bold transition-all">Kirim Mutabaah</button>
        </div>

        <!-- STEP 3: BERHASIL -->
        <div id="step3" class="p-10 text-center hidden">
            <div class="text-5xl mb-4">✅</div>
            <h2 class="text-2xl font-bold text-green-800">Berhasil Dikirim!</h2>
            <div id="quoteBox" class="mt-4 p-4 bg-green-50 rounded-lg italic text-green-700 text-sm"></div>
            <button onclick="location.reload()" class="mt-6 text-green-600 font-semibold underline">Isi Lagi</button>
        </div>
    </div>

    <script>
        window.onload = () => initData();

        async function initData() {
            try {
                const res = await fetch('/api/initial-data');
                const data = await res.json();
                
                const bSel = document.getElementById('bulan');
                bSel.innerHTML = '';
                data.daftarBulan.forEach(b => {
                    let opt = document.createElement('option');
                    opt.value = opt.text = b;
                    if (b === data.bulanSekarang) opt.selected = true;
                    bSel.add(opt);
                });
                loadNama();
            } catch (err) {
                console.error("Error init:", err);
                document.getElementById('bulan').innerHTML = '<option>Gagal memuat data</option>';
            }
        }

        async function loadNama() {
            const b = document.getElementById('bulan').value;
            const p = document.getElementById('pekan').value;
            const nSel = document.getElementById('nama');
            nSel.innerHTML = '<option>⏳ Memuat nama...</option>';

            try {
                const res = await fetch(`/api/daftar-nama?bulan=${encodeURIComponent(b)}&pekan=${p}`);
                const data = await res.json();
                nSel.innerHTML = '';
                if (data.length === 0) {
                    nSel.innerHTML = '<option disabled>Data nama tidak ditemukan</option>';
                } else {
                    data.forEach(n => {
                        let opt = document.createElement('option');
                        opt.value = opt.text = n;
                        nSel.add(opt);
                    });
                }
            } catch (err) {
                nSel.innerHTML = '<option>Error memuat nama</option>';
            }
        }

        function lanjut() {
            const nama = document.getElementById('nama').value;
            if(!nama || nama.includes("Memuat") || nama.includes("tidak ditemukan")) return alert("Pilih nama dulu!");
            document.getElementById('displayNama').innerText = nama;
            
            document.getElementById('step1').classList.replace('active', 'hidden');
            document.getElementById('step2').classList.replace('hidden', 'active');
        }

        function kembali() {
            document.getElementById('step2').classList.replace('active', 'hidden');
            document.getElementById('step1').classList.replace('hidden', 'active');
        }

        async function kirim() {
            const btn = document.getElementById('btnKirim');
            btn.disabled = true;
            btn.innerText = "Mengirim...";

            const payload = {
                bulan: document.getElementById('bulan').value,
                pekan: document.getElementById('pekan').value,
                nama: document.getElementById('nama').value,
                subuh: document.getElementById('subuh').value || 0,
                dzuhur: document.getElementById('dzuhur').value || 0,
                ashar: document.getElementById('ashar').value || 0,
                magrib: document.getElementById('magrib').value || 0,
                isya: document.getElementById('isya').value || 0,
                tahajjud: document.getElementById('tahajjud').value || 0,
                dhuha: document.getElementById('dhuha').value || 0,
                tilawah: document.getElementById('tilawah').value || 0,
                keluh: document.getElementById('keluh').value || "-"
            };

            try {
                const res = await fetch('/api/simpan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.status === "Sukses") {
                    document.getElementById('step2').classList.replace('active', 'hidden');
                    document.getElementById('step3').classList.replace('hidden', 'active');
                    document.getElementById('quoteBox').innerText = result.motivasi;
                } else {
                    alert("Gagal: " + result.msg);
                    btn.disabled = false;
                    btn.innerText = "Kirim Mutabaah";
                }
            } catch (err) {
                alert("Error koneksi!");
                btn.disabled = false;
                btn.innerText = "Kirim Mutabaah";
            }
        }
    </script>
</body>
</html>
